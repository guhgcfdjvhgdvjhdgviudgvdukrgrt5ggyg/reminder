name: Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install
      - name: Prebuild Android project
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --no-install
      - name: Bundle JS for Android
        working-directory: artifacts/mobile
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res
      - name: Build release APK
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/*.apk

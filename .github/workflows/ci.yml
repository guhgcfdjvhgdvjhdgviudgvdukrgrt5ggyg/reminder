name: Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: pnpm install

      - name: Generate Android project
        working-directory: artifacts/mobile
        run: npx expo prebuild --platform android --no-install

      - name: Force JS bundle in debug variant
        working-directory: artifacts/mobile/android
        run: |
          sed -i '/autolinkLibrariesWithApp/i\    debuggableVariants = []' app/build.gradle

      - name: Build APK
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/*.apk
